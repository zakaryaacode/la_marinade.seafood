<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menu — La Marinade</title>
<meta name="description" content="Explore La Marinade's full interactive menu with 3D dish previews and AR experience."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
<style>
:root {
  --ocean-deep:#060e1a;--ocean-dark:#0a1628;--ocean-mid:#0d2340;--ocean-teal:#0d3b5e;
  --gold:#c9a84c;--gold-light:#e2c97e;--gold-glow:rgba(201,168,76,0.25);
  --off-white:#f0ede8;--text-muted:rgba(240,237,232,0.6);
  --glass-bg:rgba(13,35,64,0.55);--glass-border:rgba(201,168,76,0.18);
  --font-serif:'Cormorant Garamond',Georgia,serif;--font-sans:'DM Sans',system-ui,sans-serif;
  --ease:cubic-bezier(0.4,0,0.2,1);--dur:0.35s;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-sans);background:var(--ocean-deep);color:var(--off-white);overflow-x:hidden;min-height:100vh;}
a{color:inherit;text-decoration:none;}
img{display:block;max-width:100%;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,14,26,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);padding:1rem clamp(1rem,4vw,3rem);}
.topbar-inner{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;max-width:1400px;margin:0 auto;}
.back-btn{display:flex;align-items:center;gap:.4rem;color:var(--gold);font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;transition:transform var(--dur);}
.back-btn:hover{transform:translateX(-4px);}
.brand{font-family:var(--font-serif);font-size:1.3rem;font-weight:300;color:var(--off-white);margin-right:auto;}
.brand em{color:var(--gold);font-style:italic;}
.search-wrap{position:relative;flex:1;max-width:280px;}
.search-wrap i{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem;}
#search-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--glass-border);border-radius:2px;padding:.55rem .8rem .55rem 2.2rem;font-family:var(--font-sans);font-size:.85rem;color:var(--off-white);outline:none;transition:border-color var(--dur);}
#search-input::placeholder{color:var(--text-muted);}
#search-input:focus{border-color:var(--gold);}

/* FILTER BAR */
.filter-section{padding:1.5rem clamp(1rem,4vw,3rem) 0;max-width:1400px;margin:0 auto;}
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;padding-bottom:1rem;}
.filter-btn{padding:.5rem 1.1rem;border:1px solid var(--glass-border);border-radius:2px;background:transparent;font-family:var(--font-sans);font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:all var(--dur);}
.filter-btn:hover{border-color:rgba(201,168,76,.5);color:var(--off-white);}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ocean-deep);}

/* GRID */
.menu-section{max-width:1400px;margin:0 auto;padding:1.5rem clamp(1rem,4vw,3rem) 4rem;}
.results-count{font-size:.78rem;color:var(--text-muted);letter-spacing:.1em;margin-bottom:1.5rem;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.5rem;}

/* CARD */
.dish-card{background:var(--ocean-dark);border:1px solid var(--glass-border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;transition:border-color var(--dur),transform var(--dur),box-shadow var(--dur);position:relative;animation:fadeIn .4s var(--ease);}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.dish-card:hover{border-color:var(--gold);transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,.4);}
.dish-card.hidden{display:none;}

/* BADGE */
.badge{position:absolute;top:.9rem;left:.9rem;z-index:10;padding:.3rem .7rem;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;border-radius:2px;font-weight:500;}
.badge-best{background:var(--gold);color:var(--ocean-deep);}
.badge-new{background:#4a90a5;color:#fff;}
.cat-label{position:absolute;top:.9rem;right:.9rem;z-index:10;padding:.25rem .6rem;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;border:1px solid var(--glass-border);background:rgba(6,14,26,.7);backdrop-filter:blur(8px);border-radius:2px;color:var(--gold);}
.type-icon{position:absolute;top:3rem;right:.9rem;z-index:10;width:28px;height:28px;border-radius:50%;background:rgba(6,14,26,.7);border:1px solid var(--glass-border);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--text-muted);}
.card-type-3d .type-icon{color:var(--gold);border-color:var(--gold);}
.card-type-photo-ar .type-icon{color:#4a90a5;border-color:#4a90a5;}

/* MODEL VIEWER / IMAGE AREA */
.card-visual{height:240px;background:linear-gradient(135deg,var(--ocean-mid),var(--ocean-teal));position:relative;overflow:hidden;}
.card-visual model-viewer{width:100%;height:100%;--poster-color:transparent;}
.card-visual img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease);}
.dish-card:hover .card-visual img{transform:scale(1.06);}
.visual-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,14,26,.5) 0%,transparent 60%);}

/* AR BTN */
.ar-row{position:absolute;bottom:.8rem;left:50%;transform:translateX(-50%);display:flex;gap:.5rem;opacity:0;transition:opacity var(--dur);}
.dish-card:hover .ar-row{opacity:1;}
.ar-btn{padding:.4rem .9rem;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;cursor:pointer;font-family:var(--font-sans);display:flex;align-items:center;gap:.35rem;transition:all var(--dur);white-space:nowrap;}
.ar-btn-primary{background:var(--gold);border:1px solid var(--gold);color:var(--ocean-deep);}
.ar-btn-primary:hover{background:var(--gold-light);}
.ar-btn-outline{background:rgba(6,14,26,.7);border:1px solid var(--glass-border);color:var(--off-white);backdrop-filter:blur(8px);}
.ar-btn-outline:hover{border-color:var(--gold);color:var(--gold);}

/* INFO */
.dish-info{padding:1.4rem 1.5rem 1.5rem;flex:1;display:flex;flex-direction:column;}
.dish-name{font-family:var(--font-serif);font-size:1.35rem;font-weight:300;color:var(--off-white);margin-bottom:.4rem;}
.dish-desc{font-size:.82rem;color:var(--text-muted);line-height:1.65;flex:1;}
.dish-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding-top:.8rem;border-top:1px solid var(--glass-border);}
.dish-price{font-size:1rem;color:var(--gold);letter-spacing:.05em;}
.dish-action{width:34px;height:34px;border-radius:50%;border:1px solid var(--glass-border);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:.8rem;cursor:pointer;transition:all var(--dur);}
.dish-action:hover{background:var(--gold);color:var(--ocean-deep);border-color:var(--gold);}

/* EMPTY */
.empty-state{text-align:center;padding:5rem 2rem;display:none;}
.empty-state i{font-size:3rem;color:var(--glass-border);margin-bottom:1rem;}
.empty-state p{color:var(--text-muted);}

/* FOOTER */
.page-footer{text-align:center;padding:2rem;border-top:1px solid var(--glass-border);font-size:.78rem;color:var(--text-muted);}

@media(max-width:600px){
  .menu-grid{grid-template-columns:1fr;}
  .topbar-inner{gap:.5rem;}
  .brand{display:none;}
  .search-wrap{max-width:100%;flex:1 1 100%;order:3;}
}
@media(max-width:900px){
  .menu-grid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr));}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a href="../../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <span class="brand">La <em>Marinade</em> — Menu</span>
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="Search dishes…" autocomplete="off"/>
    </div>
  </div>
</div>

<div class="filter-section">
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="plat">Plat &amp; Entrée Chaude</button>
    <button class="filter-btn" data-cat="pizza">Pizza</button>
    <button class="filter-btn" data-cat="burger">Burger</button>
    <button class="filter-btn" data-cat="entree-froide">Entrée Froide</button>
    <button class="filter-btn" data-cat="gratin">Gratin</button>
    <button class="filter-btn" data-cat="tacos">Tacos</button>
    <button class="filter-btn" data-cat="sandwich">Sandwich Poulet</button>
    <button class="filter-btn" data-cat="seafood">Seafood</button>
    <button class="filter-btn" data-cat="pasta">Pasta</button>
    <button class="filter-btn" data-cat="salad">Salads</button>
    <button class="filter-btn" data-cat="drinks">Drinks</button>
  </div>
</div>

<section class="menu-section">
  <p class="results-count" id="results-count"></p>
  <div class="menu-grid" id="menu-grid"></div>
  <div class="empty-state" id="empty-state">
    <i class="fas fa-utensils"></i>
    <p>No dishes found. Try another search.</p>
  </div>
</section>

<footer class="page-footer">© 2025 La Marinade · All rights reserved</footer>

<script>
/*
 * ============================================================
 *  HOW TO ADD A NEW DISH
 * ============================================================
 *  Just add an object to the ITEMS array below.
 *
 *  FIELDS:
 *    type   → "3d"       = 3D model viewer + AR button + 3D button
 *             "photo-ar" = Photo displayed + AR button (needs glb)
 *             "photo"    = Photo only, no 3D/AR
 *
 *    cat    → category key (pizza, burger, seafood, plat, etc.)
 *    name   → dish name
 *    desc   → short description
 *    price  → price string
 *    badge  → "best" | "new" | "" (empty = no badge)
 *    glb    → path to .glb file  (required for "3d" and "photo-ar")
 *    img    → path to image       (required for "photo-ar" and "photo")
 *
 *  EXAMPLES:
 *    {type:"3d",      cat:"pizza",   name:"Pizza 3D", desc:"...", price:"1 200 DA", badge:"best", glb:"../3DGLB/type1/pizza.glb"},
 *    {type:"photo-ar",cat:"burger",  name:"Burger",   desc:"...", price:"900 DA",   badge:"new",  glb:"../3DGLB/type1/pizza.glb", img:"../img/seafood_bass.png"},
 *    {type:"photo",   cat:"drinks",  name:"Juice",    desc:"...", price:"350 DA",   badge:""},
 * ============================================================
 */

const ITEMS = [
  // ──── Pizza (3D) ────
  {type:"3d", cat:"pizza", name:"Pizza Pepperoni", desc:"Spicy pepperoni, fresh mozzarella, and tomato sauce.", price:"1 200 DA", badge:"best", glb:"../3DGLB/type1/pizza11.glb"},

  // ──── Sandwich (3D) ────
  {type:"3d", cat:"sandwich", name:"Sandwich Calamar", desc:"Crispy fried calamari with tartar sauce in a fresh baguette.", price:"950 DA", badge:"best", glb:"../3DGLB/type1/sondwich calamar.glb"},
  {type:"3d", cat:"sandwich", name:"Sandwich Poisson", desc:"Grilled fish fillet with herbs and fresh salad.", price:"900 DA", badge:"new", glb:"../3DGLB/type1/sondwich poissent.glb"},

  // ──── Seafood (3D) ────
  {type:"3d", cat:"seafood", name:"Box Milonge", desc:"A mixed box of fresh seafood delicacies.", price:"2 500 DA", badge:"best", glb:"../3DGLB/type1/box milonge.glb"},
  {type:"3d", cat:"seafood", name:"Milonge Royale", desc:"Premium seafood platter with the finest catches of the day.", price:"3 200 DA", badge:"", glb:"../3DGLB/type1/milonge2.glb"},

  // ──── Plat & Entrée Chaude (3D) ────
  {type:"3d", cat:"plat", name:"Omelette Premium", desc:"Fluffy omelette prepared with fresh ingredients and herbs.", price:"600 DA", badge:"", glb:"../3DGLB/type1/omelette dish 3d model.glb"},

  // ──── Entrée Froide (3D) ────
  {type:"3d", cat:"entree-froide", name:"Cheesy Bread", desc:"Warm, oven-baked bread stuffed with melting cheese.", price:"550 DA", badge:"new", glb:"../3DGLB/type1/cheesy bread plate 3d model.glb"},

  // ──── Burger (photo + AR placeholder) ────
  {type:"photo-ar", cat:"burger", name:"Classic Smash Burger", desc:"Double smash patty, American cheese, pickles and secret sauce.", price:"1 350 DA", badge:"best", glb:"../3DGLB/type1/pizza.glb", img:"../img/p1.png"},

  // ──── Gratin (photo only) ────
  {type:"photo", cat:"gratin", name:"Gratin Dauphinois", desc:"Slow-baked potato gratin with crème fraîche and gruyère.", price:"900 DA", badge:"best", img:"../img/f1.png"},

  // ──── Tacos (photo + AR placeholder) ────
  {type:"photo-ar", cat:"tacos", name:"Tacos Poulet Grillé", desc:"Grilled chicken, avocado, pico de gallo and chipotle cream.", price:"950 DA", badge:"", glb:"../3DGLB/type1/pizza11.glb", img:"../img/p1.png"},

  // ──── Pasta (photo only) ────
  {type:"photo", cat:"pasta", name:"Spaghetti alle Vongole", desc:"Spaghetti with clams, garlic, white wine and parsley.", price:"1 300 DA", badge:"best", img:"../img/f1.png"},

  // ──── Salads (photo only) ────
  {type:"photo", cat:"salad", name:"Salade Méditerranéenne", desc:"Cucumber, tomato, feta, olives and lemon-oregano vinaigrette.", price:"700 DA", badge:"", img:"../img/m1.png"},

  // ──── Drinks (photo only) ────
  {type:"photo", cat:"drinks", name:"Limonade Menthe", desc:"Homemade lemonade with fresh mint, honey and sparkling water.", price:"380 DA", badge:"new", img:"../img/m1.png"},
];

function buildCard(item){
  const badgeHTML = item.badge === "best"
    ? `<span class="badge badge-best"><i class="fas fa-star"></i> Best Seller</span>`
    : item.badge === "new" ? `<span class="badge badge-new">New</span>` : "";

  // ── Visual area depends on type ──
  let visualHTML = "";
  let buttonsHTML = "";

  if (item.type === "3d") {
    // Card 1: 3D model-viewer + AR + 3D buttons
    visualHTML = `<model-viewer src="${item.glb}" alt="${item.name}" auto-rotate camera-controls shadow-intensity="1"
       ar ar-modes="webxr scene-viewer quick-look"
       style="width:100%;height:100%;--poster-color:transparent;"></model-viewer>`;
    buttonsHTML = `
      <button class="ar-btn ar-btn-primary" onclick="triggerAR(this)"><i class="fas fa-vr-cardboard"></i> AR</button>
      <button class="ar-btn ar-btn-outline" onclick="trigger3D(this)"><i class="fas fa-cube"></i> 3D</button>`;

  } else if (item.type === "photo-ar") {
    // Card 2: Photo displayed + hidden model-viewer for AR
    visualHTML = `<img src="${item.img}" alt="${item.name}" loading="lazy"/>
      <model-viewer src="${item.glb}" alt="${item.name}"
       ar ar-modes="webxr scene-viewer quick-look"
       style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></model-viewer>`;
    buttonsHTML = `
      <button class="ar-btn ar-btn-primary" onclick="triggerAR(this)"><i class="fas fa-vr-cardboard"></i> AR</button>`;

  } else {
    // Card 3: Photo only — no 3D, no AR
    visualHTML = `<img src="${item.img || ''}" alt="${item.name}" loading="lazy"/>`;
    buttonsHTML = "";
  }

  const typeIcon = item.type === "3d" ? '<i class="fas fa-cube"></i>'
                 : item.type === "photo-ar" ? '<i class="fas fa-camera"></i>'
                 : '<i class="fas fa-image"></i>';

  return `<div class="dish-card card-type-${item.type}" data-cat="${item.cat}" data-name="${item.name.toLowerCase()} ${item.desc.toLowerCase()}">
    ${badgeHTML}
    <span class="cat-label">${catLabel(item.cat)}</span>
    <span class="type-icon">${typeIcon}</span>
    <div class="card-visual">
      ${visualHTML}
      <div class="visual-overlay"></div>
      ${buttonsHTML ? `<div class="ar-row">${buttonsHTML}</div>` : ""}
    </div>
    <div class="dish-info">
      <div class="dish-name">${item.name}</div>
      <div class="dish-desc">${item.desc}</div>
      <div class="dish-footer">
        <span class="dish-price">${item.price}</span>
        <button class="dish-action" title="Add to order"><i class="fas fa-plus"></i></button>
      </div>
    </div>
  </div>`;
}

function catLabel(cat){
  const m={plat:"Plat & Entrée Chaude",pizza:"Pizza",burger:"Burger","entree-froide":"Entrée Froide",
    gratin:"Gratin",tacos:"Tacos",sandwich:"Sandwich Poulet",seafood:"Seafood",
    pasta:"Pasta",salad:"Salads",drinks:"Drinks"};
  return m[cat]||cat;
}

function triggerAR(btn){
  const mv=btn.closest('.card-visual').querySelector('model-viewer');
  if(mv && mv.canActivateAR) mv.activateAR();
}
function trigger3D(btn){
  const mv=btn.closest('.card-visual').querySelector('model-viewer');
  if(mv){ mv.cameraOrbit="45deg 55deg 4m"; mv.fieldOfView="30deg"; }
}

const grid=document.getElementById('menu-grid');
const countEl=document.getElementById('results-count');
const emptyEl=document.getElementById('empty-state');
let activeCat='all', searchQuery='';

function render(){
  const filtered=ITEMS.filter(item=>{
    const catMatch=activeCat==='all'||item.cat===activeCat;
    const textMatch=!searchQuery||item.name.toLowerCase().includes(searchQuery)||item.desc.toLowerCase().includes(searchQuery);
    return catMatch&&textMatch;
  });
  grid.innerHTML=filtered.map(buildCard).join('');
  const n=filtered.length;
  countEl.textContent=n===0?'':`${n} dish${n===1?'':'es'} found`;
  emptyEl.style.display=n===0?'block':'none';
}

document.getElementById('filter-bar').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn)return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat=btn.dataset.cat;
  render();
});

let searchTimer;
document.getElementById('search-input').addEventListener('input',e=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{ searchQuery=e.target.value.trim().toLowerCase(); render(); },200);
});

render();
</script>
</body>
</html>
